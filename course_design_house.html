<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Design House</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f2;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1a; color: #e0dfd8; }
    .panel { background: #2a2a27; border-color: rgba(255,255,255,0.12); }

    .legend-item { color: #a0a09a; }
  }

  h1 { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 0.25rem; color: inherit; }
  .subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 1.5rem; }

  .scene { max-width: 680px; margin: 0 auto; }
  .house-wrap { position: relative; width: 100%; }

  .panel {
    display: none;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 12px;
    padding: 1.25rem;
    margin: 1rem auto 0;
  }
  .panel.active { display: block; }
  .panel-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .panel-sub { font-size: 13px; color: #555; line-height: 1.6; }
  @media (prefers-color-scheme: dark) { .panel-sub { color: #aaa; } }
  .panel-wig {
    font-size: 12px;
    color: #888;
    margin-top: 8px;
    font-style: italic;
    border-left: 2px solid rgba(0,0,0,0.12);
    padding-left: 10px;
  }
  @media (prefers-color-scheme: dark) { .panel-wig { border-color: rgba(255,255,255,0.12); } }


  svg { display: block; }
  .part { cursor: pointer; transition: filter 0.15s; }
  .part:hover { filter: brightness(0.93); }
  .part.selected { filter: brightness(0.87); }

  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    justify-content: center; margin-top: 1rem;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #666; cursor: pointer;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .note {
    text-align: center; font-size: 11px; color: #aaa;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>
<div class="scene">
  <h1>The Course Design House</h1>
  <p class="subtitle">Backward Design after Wiggins &amp; McTighe · Click any element to learn more</p>

  <div class="house-wrap">
  <svg width="100%" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- FOUNDATION -->
  <g class="part" id="p-foundation" onclick="show('foundation')">
    <rect x="70" y="340" width="500" height="58" rx="4" fill="#3B6EB5" stroke="#2A509E" stroke-width="0.5"/>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#B5D4F4" text-anchor="middle" x="320" y="362">Transformational Goal</text>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#85B7EB" text-anchor="middle" x="320" y="382">The "Why" — what enduring change do learners take away?</text>
  </g>

  <!-- FLOOR -->
  <g class="part" id="p-floor" onclick="show('floor')">
    <rect x="90" y="296" width="460" height="46" rx="4" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" text-anchor="middle" x="320" y="316">Learning Objectives</text>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#5DCAA5" text-anchor="middle" x="320" y="333">Measurable outcomes — what learners will know, do, or value</text>
  </g>

  <!-- LEFT WALL: Formative -->
  <g class="part" id="p-formative" onclick="show('formative')">
    <rect x="90" y="128" width="118" height="170" rx="4" fill="#BA7517" stroke="#854F0B" stroke-width="0.5"/>
    <g transform="translate(149,213) rotate(-90)">
      <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500" fill="#FAC775" text-anchor="middle" dominant-baseline="central" x="0" y="-9">Formative Assessment</text>
      <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#EF9F27" text-anchor="middle" dominant-baseline="central" x="0" y="9">ongoing feedback loops</text>
    </g>
  </g>

  <!-- RIGHT WALL: Summative -->
  <g class="part" id="p-summative" onclick="show('summative')">
    <rect x="432" y="128" width="118" height="170" rx="4" fill="#993556" stroke="#72243E" stroke-width="0.5"/>
    <g transform="translate(491,213) rotate(90)">
      <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="500" fill="#F4C0D1" text-anchor="middle" dominant-baseline="central" x="0" y="-9">Summative Assessment</text>
      <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#ED93B1" text-anchor="middle" dominant-baseline="central" x="0" y="9">culminating evidence</text>
    </g>
  </g>

  <!-- ROOF -->
  <g class="part" id="p-roof" onclick="show('roof')">
    <polygon points="40,128 320,28 600,128" fill="#534AB7" stroke="#3C3489" stroke-width="0.5"/>
    <line x1="85" y1="128" x2="255" y2="55" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <line x1="178" y1="128" x2="298" y2="42" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <line x1="275" y1="128" x2="320" y2="32" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <line x1="370" y1="128" x2="340" y2="36" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <line x1="463" y1="128" x2="382" y2="50" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <line x1="555" y1="128" x2="425" y2="62" stroke="#3C3489" stroke-width="0.4" opacity="0.5"/>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#CECBF6" text-anchor="middle" x="320" y="93">Learning Activities</text>
    <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#AFA9EC" text-anchor="middle" x="320" y="112">readings · lectures · discussions · labs · projects</text>
  </g>

  <!-- Interior label -->
  <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888780" text-anchor="middle" x="320" y="220" opacity="0.7">← the learning environment →</text>
  <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#888780" text-anchor="middle" x="320" y="238" opacity="0.55">click any element to learn more</text>

  <!-- Backward Design arrow -->
  <path d="M608 338 L608 136" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#888780" text-anchor="middle" x="626" y="242" transform="rotate(90 626 242)">backward design</text>
  </svg>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item" onclick="show('foundation')"><div class="legend-dot" style="background:#3B6EB5"></div>Transformational goal</div>
    <div class="legend-item" onclick="show('floor')"><div class="legend-dot" style="background:#1D9E75"></div>Learning objectives</div>
    <div class="legend-item" onclick="show('formative')"><div class="legend-dot" style="background:#BA7517"></div>Formative assessment</div>
    <div class="legend-item" onclick="show('summative')"><div class="legend-dot" style="background:#993556"></div>Summative assessment</div>
    <div class="legend-item" onclick="show('roof')"><div class="legend-dot" style="background:#534AB7"></div>Learning activities</div>
  </div>

  <!-- Detail panel -->
  <div class="panel" id="detail-panel">
    <div class="panel-title" id="d-title"></div>
    <div class="panel-sub" id="d-body"></div>
    <div class="panel-wig" id="d-wig"></div>

  </div>

  <p class="note">Based on Wiggins &amp; McTighe, <em>Understanding by Design</em> (2005) · CIPD / Adaptive Edge Institute</p>
</div>

<script>
const data = {
  foundation: {
    title: "Transformational Goal — the foundation",
    body: "The foundation supports the entire structure. A transformational goal articulates the deepest purpose of a course: not just what learners will know, but who they will become. It answers the question, 'Why does this course exist?' Everything else is built on top of it. Without a solid foundation, the house collapses.",
    wig: "Wiggins & McTighe call this the 'enduring understanding' — the big ideas and core processes that transfer to new contexts long after the unit ends."
  },
  floor: {
    title: "Learning Objectives — the floor",
    body: "The floor rests directly on the foundation and gives the house a surface to stand on. Learning objectives translate the transformational goal into specific, measurable outcomes — what learners will be able to know, do, or value by the end of the course. They provide the platform everything else stands on.",
    wig: "In Understanding by Design, these map to Stage 1: identifying desired results. Wiggins & McTighe recommend framing objectives around transfer, meaning-making, and acquisition."
  },
  formative: {
    title: "Formative Assessment — one wall",
    body: "Formative assessments are the ongoing checks built into the learning process — low-stakes quizzes, drafts, discussions, exit tickets, peer review. Like a structural wall, they provide lateral support and keep the course aligned as it unfolds. They exist to inform instruction and give learners feedback while there's still time to adjust.",
    wig: "UbD's Stage 2 asks: what evidence will show that learning is happening in progress? Formative evidence helps both instructor and learner see where they are relative to the goals."
  },
  summative: {
    title: "Summative Assessment — the other wall",
    body: "Summative assessments are the culminating demonstrations of learning — final projects, exams, portfolios, presentations. As the other load-bearing wall, they provide symmetrical structural support. In backward design, you define these before you plan instruction, because the endpoint shapes everything else.",
    wig: "Wiggins & McTighe emphasize authentic performance tasks as the gold standard for summative evidence — tasks that ask learners to apply knowledge in meaningful, real-world contexts."
  },
  roof: {
    title: "Learning Activities — the roof",
    body: "The roof sits on top of the walls and holds it all together — but it's designed last, after the foundation and walls are in place. Learning activities (readings, lectures, labs, discussions, projects) are selected and sequenced to enable learners to reach the objectives and perform on the assessments. The roof's job is to shelter everything underneath, not to drive the design.",
    wig: "This is Stage 3 in UbD: plan learning experiences and instruction. Wiggins & McTighe argue that teachers too often start here — the classic 'twin sins' of activity-focused or coverage-focused design."
  }
};

let current = null;

function show(key) {
  const d = data[key];
  document.getElementById('d-title').textContent = d.title;
  document.getElementById('d-body').textContent = d.body;
  document.getElementById('d-wig').textContent = d.wig;
  document.getElementById('detail-panel').classList.add('active');
  document.querySelectorAll('.part').forEach(el => el.classList.remove('selected'));
  document.getElementById('p-' + key)?.classList.add('selected');
  current = key;
}
</script>
</body>
</html>
